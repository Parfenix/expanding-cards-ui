<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Expanding Cards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&display=swap"
        rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
  <div class="panel active"
       data-bg="linear-gradient(120deg, #201204, #2c2a2a, #0f172a)"
       style="background-image: url('./images/mountain.jpg')">
    <h3>First Light</h3>
  </div>
  <div class="panel"
       data-bg="linear-gradient(120deg, #011a14, #022c22, #021b16)"
       style="background-image: url('./images/forest light rays.jpg')">
    <h3>Forest Glow</h3>
  </div>
  <div class="panel"
       data-bg="linear-gradient(120deg, #050c1f, #0a1f44, #020617)"
       style="background-image: url('./images/ocean waves.jpg')">
    <h3>Deep Tide</h3>
  </div>
  <div class="panel"
       data-bg="linear-gradient(120deg, #2a1405, #3b1f07, #1c0d03)"
       style="background-image: url('./images/desert dunes.jpg')">
    <h3>Golden Dunes</h3>
  </div>
  <div class="panel"
       data-bg="linear-gradient(120deg, #000000, #020617, #0f172a)"
       style="background-image: url('./images/night sky.jpg')">
    <h3>Starry Night</h3>
  </div>
</div>
<script src="js/main.js"></script>
</body>
</html>
